name: Advanced Downloader with Fallback

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'URL of the file to download'
        required: true
        default: 'https://s2.pluginyab.ir/plugins/jet-menu-2.4.18.zip'

jobs:
  download_file_job:
    name: Download File with Multiple Tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Attempt Download with Fallback
        id: download_step
        run: |
          URL="${{ inputs.download_url }}"
          FILENAME=$(basename "$URL")
          echo "Target URL: $URL"
          echo "Output Filename: $FILENAME"

          # تلاش اول: curl (با محدودیت زمان 20 ثانیه برای اتصال و 60 ثانیه برای کل دانلود)
          echo "::group::Attempt 1: Using curl"
          curl --fail \
               --connect-timeout 15 \
               --max-time 60 \
               --retry 2 \
               --retry-delay 2 \
               -L -o "$FILENAME" "$URL"
          CURL_EXIT_CODE=$?
          echo "::endgroup::"

          if [ $CURL_EXIT_CODE -eq 0 ]; then
            echo "✅ Curl downloaded the file successfully."
            echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
          else
            echo "❌ Curl failed or timed out (exit code $CURL_EXIT_CODE). Trying wget..."
            rm -f "$FILENAME"

            # تلاش دوم: wget (با محدودیت زمان 15 ثانیه)
            echo "::group::Attempt 2: Using wget"
            wget --tries=2 \
                 --timeout=15 \
                 --read-timeout=15 \
                 -O "$FILENAME" "$URL"
            WGET_EXIT_CODE=$?
            echo "::endgroup::"
            
            if [ $WGET_EXIT_CODE -eq 0 ]; then
              echo "✅ Wget downloaded the file successfully."
              echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
            else
              echo "❌ Wget failed or timed out (exit code $WGET_EXIT_CODE). Trying aria2c..."
              rm -f "$FILENAME"

              # تلاش سوم: aria2c (با محدودیت زمان 15 ثانیه)
              echo "::group::Attempt 3: Using aria2c"
              aria2c -x 4 -s 4 \
                     --connect-timeout=15 \
                     --timeout=15 \
                     --max-tries=2 \
                     --file-allocation=none \
                     -o "$FILENAME" "$URL"
              ARIA2_EXIT_CODE=$?
              echo "::endgroup::"

              if [ $ARIA2_EXIT_CODE -eq 0 ]; then
                echo "✅ aria2c downloaded the file successfully."
                echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
              else
                echo "❌ aria2c failed or timed out (exit code $ARIA2_EXIT_CODE)."
                echo "::error::All download methods (curl, wget, aria2c) failed or timed out. Cannot download the file."
                exit 1
              fi
            fi
          fi

          echo "Verifying downloaded file..."
          ls -lh "$FILENAME"
          if [ -s "$FILENAME" ]; then
            echo "File verification successful. '$FILENAME' exists and is not empty."
          else
            echo "::error::File verification failed. File is either missing or empty."
            exit 1
          fi

      - name: Upload Downloaded File as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: ${{ steps.download_step.outputs.downloaded_file_path }}
          retention-days: 7
