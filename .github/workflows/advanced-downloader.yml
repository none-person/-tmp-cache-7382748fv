name: Advanced Downloader with Fallback

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'URL of the file to download'
        required: true
        default: 'https://s2.pluginyab.ir/plugins/jet-menu-2.4.18.zip'

jobs:
  download_file_job:
    name: Download File with Multiple Tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Attempt Download with Fallback
        id: download_step
        run: |
          URL="${{ inputs.download_url }}"
          FILENAME=$(basename "$URL")
          echo "Target URL: $URL"
          echo "Output Filename: $FILENAME"

          echo "::group::Attempt 1: Using curl"
          # قرار دادن دستور مستقیماً داخل if برای جلوگیری از توقف اسکریپت
          if curl --fail --connect-timeout 15 --max-time 60 --retry 2 --retry-delay 2 -L -o "$FILENAME" "$URL"; then
            echo "::endgroup::"
            echo "✅ Curl downloaded the file successfully."
            echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
          else
            echo "::endgroup::"
            echo "❌ Curl failed or timed out. Trying wget..."
            rm -f "$FILENAME"

            echo "::group::Attempt 2: Using wget"
            if wget --tries=2 --timeout=15 --read-timeout=15 -O "$FILENAME" "$URL"; then
              echo "::endgroup::"
              echo "✅ Wget downloaded the file successfully."
              echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
            else
              echo "::endgroup::"
              echo "❌ Wget failed or timed out. Trying aria2c..."
              rm -f "$FILENAME"

              echo "::group::Attempt 3: Using aria2c"
              if aria2c -x 4 -s 4 --connect-timeout=15 --timeout=15 --max-tries=2 --file-allocation=none -o "$FILENAME" "$URL"; then
                echo "::endgroup::"
                echo "✅ aria2c downloaded the file successfully."
                echo "downloaded_file_path=$FILENAME" >> $GITHUB_OUTPUT
              else
                echo "::endgroup::"
                echo "❌ aria2c failed or timed out."
                echo "::error::All download methods (curl, wget, aria2c) failed or timed out. This usually means the target server is blocking GitHub's IPs (Geo-blocking)."
                exit 1
              fi
            fi
          fi

          echo "Verifying downloaded file..."
          ls -lh "$FILENAME"
          if [ -s "$FILENAME" ]; then
            echo "File verification successful. '$FILENAME' exists and is not empty."
          else
            echo "::error::File verification failed. File is either missing or empty."
            exit 1
          fi

      - name: Upload Downloaded File as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: ${{ steps.download_step.outputs.downloaded_file_path }}
          retention-days: 7
