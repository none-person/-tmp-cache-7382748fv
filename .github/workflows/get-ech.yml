name: Fetch ECH Config

on:
  workflow_dispatch: # امکان اجرای دستی را به شما می‌دهد
  schedule:
    - cron: '0 0 * * *' # اجرای خودکار در نیمه‌شب هر روز (اختیاری)

jobs:
  get-ech-key:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch DNS HTTPS Record
        run: |
          echo "Fetching HTTPS record for my-vpn.firstforconnect.workers.dev..."
          
          # دریافت اطلاعات از کلادفلر با فرمت JSON
          RESPONSE=$(curl -s -H "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=my-vpn.firstforconnect.workers.dev&type=HTTPS")
          
          echo "Raw Response: $RESPONSE"
          
          # استخراج رشته ECH (حذف کلمه ech= و کاراکترهای اضافی)
          ECH_CONFIG=$(echo "$RESPONSE" | grep -o 'ech=[^"]*' | sed 's/ech=//' | sed 's/\\//g')
          
          if [ -z "$ECH_CONFIG" ]; then
            echo "Error: ECH config not found!"
            echo "Failed to get ECH" > ech_config.txt
          else
            echo "Success! ECH Config extracted."
            echo "$ECH_CONFIG" > ech_config.txt
          fi

      - name: Upload ECH Config as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ech-config-file
          path: ech_config.txt
