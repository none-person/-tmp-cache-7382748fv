name: Fetch and Update ECH Config

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-ech-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ECH Config from Cloudflare
        run: |
          # تغییر هدف به دامنه بیرونی (crypto.cloudflare.com)
          DOMAIN="crypto.cloudflare.com"
          echo "در حال دریافت اطلاعات DNS برای $DOMAIN ..."
          
          JSON_RESPONSE=$(curl -s -H "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=$DOMAIN&type=HTTPS")
          
          # استفاده از || true برای جلوگیری از توقف خودکار اسکریپت در محیط گیت‌هاب اکشن
          ECH_CONFIG=$(echo "$JSON_RESPONSE" | grep -oP 'ech="\K[^"]+' || true)
          
          # اگر کلید پیدا نشد، خطا چاپ کن و خارج شو
          if [ -z "$ECH_CONFIG" ]; then
            echo "خطا: کلید ECH در پاسخ یافت نشد! ممکن است این دامنه ECH نداشته باشد."
            echo "پاسخ دریافتی: $JSON_RESPONSE"
            exit 1
          fi
          
          echo "$ECH_CONFIG" > ech_config.txt
          echo "کلید ECH با موفقیت استخراج شد!"

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add ech_config.txt
          
          if git diff-index --quiet HEAD; then
            echo "کلید ECH تغییری نکرده است. نیازی به کامیت نیست."
          else
            git commit -m "Auto-update ECH config [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
            echo "فایل آپدیت و کامیت شد."
          fi
