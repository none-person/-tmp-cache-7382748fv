name: Fetch and Update ECH Config

on:
  workflow_dispatch: # اجازه می‌دهد این اسکریپت را به صورت دستی با یک کلیک اجرا کنید
  schedule:
    - cron: '0 0 * * *' # (اختیاری) اجرای خودکار هر روز ساعت ۱۲ شب برای آپدیت نگه داشتن کلیدها

permissions:
  contents: write # دسترسی لازم برای کامیت کردن فایل در ریپازیتوری

jobs:
  update-ech-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ECH Config from Cloudflare
        run: |
          # دریافت اطلاعات رکوردهای HTTPS از کلادفلر
          JSON_RESPONSE=$(curl -s -H "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=my-vpn.firstforconnect.workers.dev&type=HTTPS")
          
          # استخراج مقدار قرار گرفته در مقابل ="ech" 
          # از عبارات باقاعده (RegEx) استفاده شده تا فقط رشته بین دابل‌کوتیشن استخراج شود
          ECH_CONFIG=$(echo "$JSON_RESPONSE" | grep -oP 'ech="\K[^"]+')
          
          # بررسی اینکه آیا کلید با موفقیت استخراج شده است یا خیر
          if [ -z "$ECH_CONFIG" ]; then
            echo "خطا: کلید ECH در پاسخ یافت نشد!"
            echo "پاسخ دریافتی: $JSON_RESPONSE"
            exit 1
          fi
          
          # ذخیره کلید در فایل متنی
          echo "$ECH_CONFIG" > ech_config.txt
          echo "کلید با موفقیت استخراج شد و در ech_config.txt قرار گرفت."

      - name: Commit and Push changes
        run: |
          # تنظیمات یوزر برای کامیت گیت‌هاب
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # اضافه کردن فایل متنی
          git add ech_config.txt
          
          # بررسی اینکه آیا فایل نسبت به قبل تغییری کرده است یا خیر
          if git diff-index --quiet HEAD; then
            echo "کلید ECH تغییری نکرده است. نیازی به کامیت جدید نیست."
          else
            git commit -m "Auto-update ECH config [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
            echo "فایل جدید کامیت و پوش شد."
          fi
