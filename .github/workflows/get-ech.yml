name: Get Cloudflare ECH Config

on:
  workflow_dispatch: # امکان اجرای دستی (Manual Trigger) را فراهم می‌کند
  schedule:
    - cron: '0 0 * * *' # اجرای خودکار هر روز نیمه‌شب (اختیاری)

jobs:
  fetch-ech:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch and Extract ECH Config
        run: |
          echo "Fetching DNS record for my-vpn.firstforconnect.workers.dev..."
          
          # درخواست به API کلادفلر
          RESPONSE=$(curl -s -H "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=my-vpn.firstforconnect.workers.dev&type=HTTPS")
          
          # استخراج رشته ECH با استفاده از jq و grep
          # مقدار data چیزی شبیه این است: 1 . alpn="h3,h2" ipv4hint=... ech=AEX+...
          ECH_STR=$(echo "$RESPONSE" | jq -r '.Answer[]?.data' | grep -oP 'ech=\K[^" ]+')
          
          if [ -z "$ECH_STR" ]; then
            echo "Error: Could not find ECH config. Maybe the domain doesn't have ECH enabled or the response is invalid."
            echo "Raw response was:"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "Successfully extracted ECH Config!"
          echo "Saving to ech_config.txt..."
          
          # ذخیره در فایل متنی
          echo "$ECH_STR" > ech_config.txt
          
      - name: Upload ECH Config File
        uses: actions/upload-artifact@v4
        with:
          name: ECH-Config-File
          path: ech_config.txt
          retention-days: 5 # فایل تا ۵ روز در گیت‌هاب برای دانلود می‌ماند
